name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Build macOS daemon (Universal)
        run: |
          cargo build --release -p justdrop-daemon --target aarch64-apple-darwin
          cargo build --release -p justdrop-daemon --target x86_64-apple-darwin
          # Lipo them together for a universal binary
          lipo -create -output target/release/justdrop-macos-daemon target/aarch64-apple-darwin/release/justdrop target/x86_64-apple-darwin/release/justdrop

      - name: Package macOS Zip
        run: |
          cp target/release/justdrop-macos-daemon ./
          chmod +x install.sh uninstall.sh
          zip -r JustDrop-macOS-${{ github.ref_name }}.zip justdrop-macos-daemon install.sh uninstall.sh
          
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: JustDrop-macOS-${{ github.ref_name }}.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust JNI Libraries
        run: |
          mkdir -p platform/android/app/src/main/jniLibs
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -o ./platform/android/app/src/main/jniLibs build --release -p justdrop-ffi

      - name: Build Android APK
        working-directory: platform/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Rename Android APK
        run: |
          cp platform/android/app/build/outputs/apk/release/app-release-unsigned.apk JustDrop-Android-${{ github.ref_name }}.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: JustDrop-Android-${{ github.ref_name }}.apk

  publish:
    needs: [build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-release
          
      - uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: JustDrop ${{ github.ref_name }}
          body: |
            ### JustDrop ${{ github.ref_name }}
            
            This release includes the latest renaming from RustDrop to **JustDrop** along with new rich notification features, Control Center/Menu Bar integrations, and automatic downloads folder configuration.
            
            #### Key Features:
            - **Control Center / Menu Bar Toggle:** Quick access menu bar toggle for macOS and Control Center Quick Settings Tile for Android to easily turn transfer sharing on or off.
            - **Rich AirDrop-Style Notifications:**
              - Interactive notification popups with **Accept** or **Reject** buttons for transfers.
              - Live progress bars for incoming/outgoing transfers.
              - Completion alerts indicating exactly where the file has been saved.
            - **Standard Storage Folder:** Automatically saves all received files to a dedicated `JustDrop` directory (`~/JustDrop` on macOS and `/sdcard/JustDrop` on Android) for quick and easy access.
            - **Simple Uninstaller:** Added `uninstall.sh` and corresponding uninstallation guides in the README.md to easily remove the application.
          files: |
            *.zip
            *.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
