name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Release APK
        working-directory: platform/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: justdrop-android
          path: platform/android/app/build/outputs/apk/release/*.apk

  build-macos:
    name: Build macOS Binary
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build Release
        run: |
          cd platform/macos
          ./build.sh
          cd build
          zip -r ../../../JustDrop-macOS-arm64.zip JustDrop.app

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: justdrop-macos
          path: JustDrop-macOS-arm64.zip

  release:
    name: Create GitHub Release
    needs: [build-android, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: justdrop-android
          path: artifacts/android

      - uses: actions/download-artifact@v4
        with:
          name: justdrop-macos
          path: artifacts/macos

      - name: Rename APK
        run: |
          APK=$(find artifacts/android -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" artifacts/JustDrop-android.apk
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/JustDrop-android.apk
            artifacts/macos/JustDrop-macOS-arm64.zip
